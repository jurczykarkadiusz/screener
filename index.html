<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Scanner - Sorted & Ranked</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h2 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; background-color: #161b22; }
        th, td { border: 1px solid #30363d; padding: 10px; text-align: left; }
        th { background-color: #21262d; position: sticky; top: 0; z-index: 10; }
        
        /* Kolory tekstu wskaźników */
        .strong-buy { color: #00ff00; font-weight: bold; }
        .buy { color: #81ef81; }
        .neutral { color: #8b949e; }
        .sell { color: #ff7b72; }
        .strong-sell { color: #ff0000; font-weight: bold; }

        /* TŁA WIERSZY - LOGIKA SORTOWANIA */
        /* 1. Najwyższy priorytet: 3x Strong */
        .row-3-strong-buy { background-color: rgba(0, 255, 0, 0.4) !important; border-left: 6px solid #00ff00; }
        .row-3-strong-sell { background-color: rgba(255, 0, 0, 0.4) !important; border-left: 6px solid #ff0000; }
        
        /* 2. Średni priorytet: 2x Strong (Summary + MA) */
        .row-2-strong-buy { background-color: rgba(0, 255, 0, 0.15) !important; border-left: 4px solid #81ef81; }
        .row-2-strong-sell { background-color: rgba(255, 0, 0, 0.15) !important; border-left: 4px solid #ff7b72; }
        
        tr:hover { background-color: #2d333b !important; }
    </style>
</head>
<body>

    <h2>Live Scanner: Sorted by Strength (10s refresh)</h2>
    <table id="scannerTable">
        <thead>
            <tr>
                <th>(1) Instrument</th>
                <th>(2) Oscillators</th>
                <th>(3) Summary</th>
                <th>(4) Moving Averages</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const instruments = [
            "Brent Oil OTC", "WTI Crude Oil OTC", "Silver OTC", "Gold OTC", "Natural Gas OTC", "Palladium spot OTC", "Platinum spot OTC",
            "Apple OTC", "Intel OTC", "Johnson & Johnson OTC", "Pfizer Inc OTC", "FedEx OTC", "GameStop Corp OTC", "Marathon Digital Holdings OTC", "VISA OTC", "Netflix OTC", "ExxonMobil OTC", "VIX OTC", "McDonald's OTC", "Palantir Technologies OTC", "Boeing Company OTC", "American Express OTC", "Citigroup Inc OTC", "Alibaba OTC", "Tesla OTC", "Cisco OTC", "Amazon OTC", "Microsoft OTC", "Coinbase Global OTC", "FACEBOOK INC OTC", "AMD OTC",
            "AUD/JPY", "CAD/CHF", "CAD/JPY", "CHF/JPY", "EUR/AUD", "EUR/JPY", "GBP/AUD", "GBP/JPY", "USD/DZD OTC", "SAR/CNY OTC", "AUD/CHF", "GBP/CAD", "GBP/CHF", "USD/CAD", "USD/JPY", "USD/CLP OTC", "AUD/NZD OTC", "NZD/JPY OTC", "USD/MXN OTC", "USD/PKR OTC", "QAR/CNY OTC", "OMR/CNY OTC", "AUD/CAD", "EUR/USD", "NZD/USD OTC", "USD/EGP OTC", "EUR/CHF", "LBP/USD OTC", "USD/SGD OTC", "YER/USD OTC", "AUD/USD", "NGN/USD OTC", "EUR/CAD", "USD/CHF", "USD/IDR OTC", "USD/ARS OTC", "EUR/GBP OTC", "AUD/CAD OTC", "UAH/USD OTC", "KES/USD OTC", "EUR/HUF OTC", "MAD/USD OTC", "EUR/RUB OTC", "USD/COP OTC", "CHF/NOK OTC"
        ];

        const ratings = ["Strong Sell", "Sell", "Neutral", "Buy", "Strong Buy"];

        function getRandomRating() {
            return ratings[Math.floor(Math.random() * ratings.length)];
        }

        function updateTable() {
            const tbody = document.getElementById('tableBody');
            
            // 1. Generujemy dane dla wszystkich instrumentów
            let data = instruments.map(name => {
                const osc = getRandomRating();
                const sum = getRandomRating();
                const ma = getRandomRating();
                
                // Przypisanie wagi do sortowania
                let weight = 0; 
                let styleClass = '';

                if (osc === "Strong Buy" && sum === "Strong Buy" && ma === "Strong Buy") {
                    weight = 4; // Top priorytet
                    styleClass = 'row-3-strong-buy';
                } else if (osc === "Strong Sell" && sum === "Strong Sell" && ma === "Strong Sell") {
                    weight = 4;
                    styleClass = 'row-3-strong-sell';
                } else if (sum === "Strong Buy" && ma === "Strong Buy") {
                    weight = 3; // Jasna zieleń
                    styleClass = 'row-2-strong-buy';
                } else if (sum === "Strong Sell" && ma === "Strong Sell") {
                    weight = 3; // Jasna czerwień
                    styleClass = 'row-2-strong-sell';
                } else {
                    weight = 0; // Reszta
                }

                return { name, osc, sum, ma, weight, styleClass };
            });

            // 2. Sortujemy: od najwyższej wagi (najmocniejsze sygnały) do najniższej
            data.sort((a, b) => b.weight - a.weight);

            // 3. Renderujemy tabelę
            tbody.innerHTML = '';
            data.forEach(item => {
                const row = document.createElement('tr');
                if (item.styleClass) row.className = item.styleClass;

                row.innerHTML = `
                    <td><strong>${item.name}</strong></td>
                    <td class="${item.osc.toLowerCase().replace(' ', '-')}">${item.osc}</td>
                    <td class="${item.sum.toLowerCase().replace(' ', '-')}">${item.sum}</td>
                    <td class="${item.ma.toLowerCase().replace(' ', '-')}">${item.ma}</td>
                `;
                tbody.appendChild(row);
            });
        }

        setInterval(updateTable, 10000);
        updateTable();
    </script>
</body>
</html>
