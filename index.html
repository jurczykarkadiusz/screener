<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analizy Technicznej</title>
    <style>
        body {
            background-color: #131722;
            color: #ffffff;
            font-family: 'Trebuchet MS', sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #d1d4dc;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .widget-card {
            background: #1e222d;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>Live Market Signals (Summary & Moving Averages)</h1>
    
    <div class="container" id="dashboard">
        <!-- Widżety zostaną wygenerowane tutaj przez JavaScript -->
    </div>

    <script>
        const assets = [
            { name: "EUR/USD", symbol: "FX_IDC:EURUSD" },
            { name: "GBP/USD", symbol: "FX_IDC:GBPUSD" },
            { name: "EUR/JPY", symbol: "FX_IDC:EURJPY" },
            { name: "BRENT", symbol: "ICE:UKOIL" },
            { name: "PLATINUM", symbol: "OANDA:XPTUSD" },
            { name: "EUR/GBP (OTC)", symbol: "FX_IDC:EURGBP" },
            { name: "APPLE", symbol: "NASDAQ:AAPL" },
            { name: "GOLD", symbol: "OANDA:XAUUSD" },
            { name: "MICROSOFT", symbol: "NASDAQ:MSFT" },
            { name: "USD/CAD", symbol: "FX_IDC:USDCAD" },
            { name: "AMAZON", symbol: "NASDAQ:AMZN" },
            { name: "GOOGLE", symbol: "NASDAQ:GOOGL" },
            { name: "FACEBOOK", symbol: "NASDAQ:META" },
            { name: "SILVER", symbol: "OANDA:XAGUSD" },
            { name: "BTC/USD", symbol: "COINBASE:BTCUSD" },
            { name: "USD/CHF (OTC)", symbol: "FX_IDC:USDCHF" },
            { name: "AUD/USD (OTC)", symbol: "FX_IDC:AUDUSD" },
            { name: "USD/JPY", symbol: "FX_IDC:USDJPY" },
            { name: "AUD/JPY", symbol: "FX_IDC:AUDJPY" },
            { name: "NATURAL GAS", symbol: "NYMEX:NATGAS" },
            { name: "INTEL", symbol: "NASDAQ:INTC" }
        ];

        const container = document.getElementById('dashboard');

        assets.forEach(asset => {
            const card = document.createElement('div');
            card.className = 'widget-card';
            
            // Unikalny ID dla każdego widżetu
            const widgetId = `tv-widget-${asset.symbol.replace(':', '-')}`;
            const widgetContainer = document.createElement('div');
            widgetContainer.id = widgetId;
            card.appendChild(widgetContainer);
            container.appendChild(card);

            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
            script.async = true;
            
            // Konfiguracja widżetu TradingView
            script.innerHTML = JSON.stringify({
                "interval": "1m",
                "width": "100%",
                "isTransparent": true,
                "height": 380,
                "symbol": asset.symbol,
                "showIntervalTabs": true,
                "displayMode": "single",
                "locale": "pl",
                "colorTheme": "dark"
            });

            widgetContainer.appendChild(script);
        });
    </script>
</body>
</html>
