<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Sygnały TradingView - Pełna Lista</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #d1d4dc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 10px;
            border-bottom: 1px solid #2a2e39;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: #171b26;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .asset-title {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        .asset-ticker {
            font-size: 11px;
            color: #787b86;
            margin-bottom: 15px;
        }

        /* KOLORYSTYKA */
        .signal-box {
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Twoje wymagania kolorystyczne */
        .strong-buy { background-color: #089981; color: white; } /* Zielony */
        .strong-sell { background-color: #f23645; color: white; } /* Czerwony */
        .neutral-gray { background-color: #363a45; color: #b2b5be; } /* Szary dla reszty */

        .ma-label {
            margin-top: 12px;
            font-size: 10px;
            color: #787b86;
            display: flex;
            justify-content: space-between;
        }

        .ma-value { font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2>Market Analysis Dashboard</h2>
    <p id="update-time">Inicjalizacja danych...</p>
</div>

<div class="grid" id="main-grid">
    <!-- Tutaj trafi 25 kart -->
</div>

<script>
    // Pełna lista 25 instrumentów zgodnie z Twoim postem
    const rawAssets = {
        "EUR/USD": ["FX_IDC", "EURUSD"],
        "GBP/USD": ["FX_IDC", "GBPUSD"],
        "EUR/JPY": ["FX_IDC", "EURJPY"],
        "BRENT": ["ICE", "UKOIL"],
        "PLATINUM": ["OANDA", "XPTUSD"],
        "EUR/GBP (OTC)": ["FX_IDC", "EURGBP"],
        "APPLE": ["NASDAQ", "AAPL"],
        "GOLD": ["OANDA", "XAUUSD"],
        "MICROSOFT": ["NASDAQ", "MSFT"],
        "USD/CAD": ["FX_IDC", "USDCAD"],
        "AMAZON": ["NASDAQ", "AMZN"],
        "GOOGLE": ["NASDAQ", "GOOGL"],
        "FACEBOOK": ["NASDAQ", "META"],
        "SILVER": ["OANDA", "XAGUSD"],
        "EUR/USD (OTC)": ["FX_IDC", "EURUSD"],
        "GBP/USD (OTC)": ["FX_IDC", "GBPUSD"],
        "GOLD (OTC)": ["OANDA", "XAUUSD"],
        "BTC/USD": ["COINBASE", "BTCUSD"],
        "USD/CHF (OTC)": ["FX_IDC", "USDCHF"],
        "AUD/USD (OTC)": ["FX_IDC", "AUDUSD"],
        "USD/JPY": ["FX_IDC", "USDJPY"],
        "AUD/USD": ["FX_IDC", "AUDUSD"],
        "AUD/JPY": ["FX_IDC", "AUDJPY"],
        "NATURAL GAS": ["NYMEX", "NATGAS"],
        "INTEL": ["NASDAQ", "INTC"]
    };

    async function fetchMarketData() {
        const tickers = Object.values(rawAssets).map(v => `${v[0]}:${v[1]}`);
        
        try {
            const response = await fetch("https://scanner.tradingview.com/forex/scan", {
                method: "POST",
                body: JSON.stringify({
                    "symbols": { "tickers": tickers },
                    "columns": ["recommendation", "MA.Recommendation", "description"]
                })
            });
            const json = await response.json();
            renderDashboard(json.data);
            document.getElementById('update-time').innerText = "Ostatnia aktualizacja: " + new Date().toLocaleTimeString();
        } catch (err) {
            console.error("Błąd pobierania danych:", err);
        }
    }

    function getStyleClass(val) {
        if (val >= 0.5) return "strong-buy";
        if (val <= -0.5) return "strong-sell";
        return "neutral-gray"; // Dla Buy, Sell i Neutral
    }

    function getLabel(val) {
        if (val >= 0.5) return "Strong Buy";
        if (val > 0.1 && val < 0.5) return "Buy";
        if (val <= -0.5) return "Strong Sell";
        if (val < -0.1 && val > -0.5) return "Sell";
        return "Neutral";
    }

    function renderDashboard(data) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';

        Object.keys(rawAssets).forEach((name, index) => {
            const result = data[index].d;
            const summaryVal = result[0];
            const maVal = result[1];

            const card = document.createElement('div');
            card.className = 'card';

            const summaryClass = getStyleClass(summaryVal);
            const summaryLabel = getLabel(summaryVal);
            const maLabel = getLabel(maVal);

            card.innerHTML = `
                <div>
                    <div class="asset-title">${name}</div>
                    <div class="asset-ticker">${rawAssets[name][0]}:${rawAssets[name][1]}</div>
                </div>
                
                <div class="signal-box ${summaryClass}">
                    ${summaryLabel}
                </div>

                <div class="ma-label">
                    <span>Moving Averages:</span>
                    <span class="ma-value" style="color: ${maVal >= 0.5 ? '#089981' : (maVal <= -0.5 ? '#f23645' : '#787b86')}">
                        ${maLabel}
                    </span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Uruchomienie i interwał (co 15 sekund)
    fetchMarketData();
    setInterval(fetchMarketData, 15000);
</script>

</body>
</html>
